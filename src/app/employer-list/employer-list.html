<mat-toolbar color="primary">
  <span>JobFinder - Employers</span>
  <span class="spacer"></span>
  <button mat-button routerLink="/employers">Employers</button>
  <button mat-button routerLink="/jobseekers">Jobseekers</button>
</mat-toolbar>

<div class="container">
  <div class="header-row">
    <h1>Employers</h1>
    <button mat-raised-button color="primary" (click)="onCreate()">
      New Employer
    </button>
  </div>

  <mat-card>
    <mat-card-content>

      <div *ngIf="isLoading">
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      </div>

      <div *ngIf="errorMessage" class="error">
        {{ errorMessage }}
      </div>

      <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

        <!-- Company Name Column -->
        <ng-container matColumnDef="companyName">
          <th mat-header-cell *matHeaderCellDef> Company </th>
          <td mat-cell *matCellDef="let element"> {{ element.companyName }} </td>
        </ng-container>

        <!-- Contact Email Column -->
        <ng-container matColumnDef="contactEmail">
          <th mat-header-cell *matHeaderCellDef> Contact </th>
          <td mat-cell *matCellDef="let element"> {{ element.contactEmail }} </td>
        </ng-container>

        <!-- Location Column -->
        <ng-container matColumnDef="location">
          <th mat-header-cell *matHeaderCellDef> Location </th>
          <td mat-cell *matCellDef="let element"> {{ element.location }} </td>
        </ng-container>

        <!-- Jobs Count Column -->
        <ng-container matColumnDef="jobsCount">
          <th mat-header-cell *matHeaderCellDef> Jobs </th>
          <td mat-cell *matCellDef="let element">
            {{ getJobsCount(element) }}
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let element">
            <button mat-button color="primary" (click)="onView(element)">
              View
            </button>
            <button mat-button color="warn" (click)="onDelete(element)">
              Delete
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </mat-card-content>
  </mat-card>
</div>
